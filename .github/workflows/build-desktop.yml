name: Build Desktop

on:
  workflow_call:
    inputs:
      version:
        description: Version to set in package.json. A leading v is stripped.
        type: string
        default: ''
      is-release:
        description: Upload installer/archive release artifacts in addition to Steam depots.
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            package_script: desktop:package:linux
            release_artifact_name: desktop-linux
            release_artifact_path: |
              desktop-dist/*.AppImage
            steam_artifact_name: steam-linux
            steam_artifact_path: desktop-dist/linux-unpacked
          - os: windows-latest
            platform: windows
            package_script: desktop:package:win
            release_artifact_name: desktop-windows
            release_artifact_path: |
              desktop-dist/*.exe
              desktop-dist/*.zip
            steam_artifact_name: steam-windows
            steam_artifact_path: desktop-dist/win-unpacked
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync package.json version
        if: inputs.version != ''
        run: bun pm pkg set version="${VERSION#v}"
        shell: bash
        env:
          VERSION: ${{ inputs.version }}

      - name: Package desktop (${{ matrix.platform }})
        run: bun run ${{ matrix.package_script }}

      - name: Upload release artifacts
        if: inputs.is-release
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.release_artifact_name }}
          path: ${{ matrix.release_artifact_path }}
          if-no-files-found: error

      - name: Upload unpacked build for Steam
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.steam_artifact_name }}
          path: ${{ matrix.steam_artifact_path }}
          if-no-files-found: error
